name: Generate planning geria

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Generate
        run: python generate_geria.py

      - name: Commit and push
        run: |
          git config user.name "Planning Bot"
          git config user.email "bot@planning"
          git add index.html
          git diff --staged --quiet || git commit -m "Update planning"
          git push

      - name: Upload Pages artifact
